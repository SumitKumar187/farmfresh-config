server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customers/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**

        - id: dashboard-service
          uri: lb://DASHBOARD-SERVICE
          predicates:
            - Path=/dashboard/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/